version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: productvault-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: product_mgmt
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: productvault-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: product_mgmt
      JWT_SECRET: change-this-in-production-very-secret-key
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app/frontend

volumes:
  mysql_data:
